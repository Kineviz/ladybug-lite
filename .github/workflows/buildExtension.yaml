name: Build Ladybug Extensions

on:
  push:
    branches: [ release ]
  pull_request:
    branches: [ release ]
  workflow_dispatch:

jobs:

  build:
    name: Build on ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    environment: TOKENS
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            runner: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install @ladybugdb/core
      run: |
        yarn cache clean
        yarn add @ladybugdb/core --force
        echo "@ladybugdb/core version: $(node -p "require('./node_modules/@ladybugdb/core/package.json').version")"

    - name: Clone upstream ladybug source
      env:
        LBUG_SUBMODULES: extension
      run: yarn clone:source

    - name: Build Ladybug Extensions (${{ matrix.arch }})
      # buildLadybugExtensions.sh writes artifacts to
      # $APP_ROOT_DIR/extensions/alpine-$ARCH/ by default. chown back to the
      # runner user at the end: the container runs as root, so otherwise the
      # host runner can't git-reset/git-add those files (round-2 failure was
      # exactly "fatal: cannot create directory at 'extensions/alpine-arm64':
      # Permission denied").
      run: |
        HOST_UID=$(id -u)
        HOST_GID=$(id -g)
        docker run --rm \
        --platform linux/${{ matrix.arch }} \
        -v ${{ github.workspace }}:/app \
        -e LBUG_SOURCE_DIR=/app/lbug-src \
        -e HOST_UID="$HOST_UID" \
        -e HOST_GID="$HOST_GID" \
        node:22-alpine /bin/sh -c "
          apk add --no-cache bash g++ build-base python3 openssl openssl-dev make cmake zlib-dev musl-dev && \
          cd /app && bash ./util/buildLadybugExtensions.sh && \
          chown -R \$HOST_UID:\$HOST_GID /app/extensions /app/lbug-src 2>/dev/null || true
        "

    - name: Reset and force push changes
      # `git add extensions/` (directory form) is more reliable than the old
      # extensions/*/*.ext glob, which depends on shell expansion finding
      # matches on disk BEFORE git sees the pathspec. `extensions/version`
      # is the cache key read by util/buildLadybugExtensions.sh; written
      # AFTER the reset so it lands on the freshly-reset tree, not the stale
      # one from a previous run.
      run: |
        export lbug_version=$(node -p "require('./node_modules/@ladybugdb/core/package.json').version")
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git fetch origin ${{ github.ref }}
        git reset --hard origin/${{ github.ref_name }}
        mkdir -p extensions
        echo "$lbug_version" > extensions/version
        git add extensions/ 2>/dev/null || true
        git commit -m "Add compiled lbug extension for @ladybugdb/core v$lbug_version [skip ci]" || echo "Nothing to commit"
        for attempt in 1 2 3 4 5; do
          if git push --force; then
            echo "Pushed on attempt $attempt."
            exit 0
          fi
          echo "Push attempt $attempt failed, sleeping 15s before retry..."
          sleep 15
        done
        echo "git push failed after 5 attempts." >&2
        exit 1
