name: Build Ladybug Lite for macOS Intel

# Independent build + publish pipeline for darwin-amd64.
#
# Why a separate workflow (not a matrix entry in build.yaml):
#   - Runner OS differs (macOS, not Linux), so it can't share the docker-based
#     build steps used for Alpine targets.
#   - Upstream @ladybugdb/core does NOT ship a darwin-amd64 prebuilt for 0.15.x,
#     so we must compile lbug-source/tools/nodejs_api from source on a real
#     Intel Mac runner.
#   - macos-26-intel is GitHub's last x86_64 macOS image (Apple Silicon only
#     after Aug 2027), so this workflow has a finite lifetime.

on:
  push:
    branches: [ release ]
  pull_request:
    branches: [ release ]
  workflow_dispatch:

jobs:
  build:
    name: Build on darwin-amd64
    runs-on: macos-26-intel
    environment: TOKENS
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install build toolchain
      run: |
        # macos-26-intel images normally ship cmake + openssl via brew.
        # Make sure they're present and exported so cmake can find OpenSSL.
        brew update >/dev/null
        brew list cmake >/dev/null 2>&1 || brew install cmake
        brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

    - name: Install @ladybugdb/core
      # @ladybugdb/core@0.15.x has no darwin-amd64 sub-package and no longer
      # ships lbug-source/ in the tarball, so its install.js would fail with a
      # misleading /bin/sh ENOENT on this runner. Skip scripts; the source is
      # fetched by `yarn clone:source` in the next step.
      run: |
        yarn cache clean
        yarn add @ladybugdb/core --force --ignore-scripts
        echo "@ladybugdb/core version: $(node -p "require('./node_modules/@ladybugdb/core/package.json').version")"

    - name: Clone upstream ladybug source
      env:
        LBUG_SUBMODULES: tools/nodejs_api
      run: yarn clone:source

    - name: Build lbugjs.node from source (darwin-amd64)
      env:
        LBUG_SOURCE_DIR: ${{ github.workspace }}/lbug-src
        OUTPUT_PATH: ${{ github.workspace }}/node_modules/@ladybugdb/core/prebuilt/lbugjs-darwin-amd64.node
      run: yarn build:native

    - name: Configure npm authentication
      run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKENS }}" > ~/.npmrc

    - name: Package for publish
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: yarn build

    - name: Test natively (darwin-amd64)
      id: native_test
      run: |
        cp -f prebuilt/lbugjs-darwin-amd64.node lbugjs.node
        cd util && node ./test.js || echo "test_failed=true" >> $GITHUB_OUTPUT

    - name: Merge and push changes
      # Retry loop to absorb transient GitHub 500s and races with the sibling
      # Linux/Extensions jobs. Also writes prebuilt/version so future re-runs
      # can fast-exit via util/buildLbugjsNode.sh's cache path.
      run: |
        export lbug_version=$(node -p "require('./node_modules/@ladybugdb/core/package.json').version")
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        echo "$lbug_version" > prebuilt/version
        git add prebuilt/*.node prebuilt/version *.js package.json || true
        git commit -m "Add compiled lbugjs-darwin-amd64.node for @ladybugdb/core v$lbug_version [skip ci]" || echo "Nothing to commit"
        for attempt in 1 2 3 4 5; do
          git fetch origin ${{ github.ref }} || true
          git merge -X ours origin/${{ github.ref_name }} --no-edit || true
          if git push; then
            echo "Pushed on attempt $attempt."
            exit 0
          fi
          echo "Push attempt $attempt failed, sleeping 15s before retry..."
          sleep 15
        done
        echo "git push failed after 5 attempts." >&2
        exit 1
