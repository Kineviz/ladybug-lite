name: Build Ladybug Lite for macOS Intel

# Independent build + publish pipeline for darwin-x64.
#
# Why a separate workflow (not a matrix entry in build.yaml):
#   - Runner OS differs (macOS, not Linux), so it can't share the docker-based
#     build steps used for Alpine targets.
#   - Upstream @ladybugdb/core does NOT ship a darwin-x64 prebuilt for 0.15.x,
#     so we must compile lbug-source/tools/nodejs_api from source on a real
#     Intel Mac runner.
#   - macos-26-intel is GitHub's last x86_64 macOS image (Apple Silicon only
#     after Aug 2027), so this workflow has a finite lifetime.

on:
  push:
    branches: [ release ]
  pull_request:
    branches: [ release ]
  workflow_dispatch:

jobs:
  build:
    name: Build on darwin-x64
    runs-on: macos-26-intel
    environment: TOKENS
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install build toolchain
      run: |
        # macos-26-intel images normally ship cmake + openssl via brew.
        # Make sure they're present and exported so cmake can find OpenSSL.
        brew update >/dev/null
        brew list cmake >/dev/null 2>&1 || brew install cmake
        brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        yarn cache clean
        yarn add @ladybugdb/core --force
        echo "@ladybugdb/core version: $(yarn list @ladybugdb/core | grep @ladybugdb/core)"

    - name: Build lbugjs.node from source (darwin-x64)
      run: |
        cd node_modules/@ladybugdb/core/lbug-source/tools/nodejs_api
        yarn install
        yarn build
        mkdir -p $GITHUB_WORKSPACE/node_modules/@ladybugdb/core/prebuilt
        cp -f build/lbugjs.node $GITHUB_WORKSPACE/node_modules/@ladybugdb/core/prebuilt/lbugjs-darwin-x64.node
        file $GITHUB_WORKSPACE/node_modules/@ladybugdb/core/prebuilt/lbugjs-darwin-x64.node

    - name: Configure npm authentication
      run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKENS }}" > ~/.npmrc

    - name: Copy compiled file to repo directory and publish
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        mkdir -p prebuilt \
        && cp -f node_modules/@ladybugdb/core/prebuilt/*.node prebuilt/ \
        && yarn build

    - name: Test natively (darwin-x64)
      id: native_test
      run: |
        cp -f prebuilt/lbugjs-darwin-x64.node lbugjs.node
        cd util && node ./test.js || echo "test_failed=true" >> $GITHUB_OUTPUT

    - name: Merge and push changes
      run: |
        export lbug_version=$(node -p "require('./node_modules/@ladybugdb/core/package.json').version")
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add prebuilt/*.node *.js package.json || true
        git commit -m "Add compiled lbugjs-darwin-x64.node for @ladybugdb/core v$lbug_version [skip ci]" || echo "Nothing to commit"
        git fetch origin ${{ github.ref }}
        git merge -X ours origin/${{ github.ref_name }} --no-edit || true
        git push

    - name: Tag with version
      run: |
        export lbug_version=$(node -p "require('./node_modules/@ladybugdb/core/package.json').version")
        git fetch --tags origin
        git tag -d "$lbug_version" || true
        git push origin ":refs/tags/$lbug_version" || true
        git tag -a "$lbug_version" -m "Release $lbug_version"
        git push origin "$lbug_version"
